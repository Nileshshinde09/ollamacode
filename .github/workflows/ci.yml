# ============================================================
# ci.yml — Run type check and build on every push / PR
#
# This runs on every push to main and on all pull requests.
# Acts as a guard — prevents broken code from merging.
# ============================================================

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Type Check & Build
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22']
      fail-fast: false   # run all matrix jobs even if one fails

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node ────────────────────────────────────
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # ── 3. Install ───────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type check ────────────────────────────────────
      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── 5. Build ─────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Verify CLI entry point ────────────────────────
      - name: Verify CLI binary
        run: node dist/index.js --version

      # ── 7. Check package can be packed ───────────────────
      - name: Dry-run npm pack
        run: npm pack --dry-Run