# ============================================================
# publish.yml — Publish to npm on version tag push
#
# HOW TO USE:
#   1. Add your npm token to GitHub Secrets:
#      Settings → Secrets → Actions → New secret
#      Name: NPM_TOKEN
#      Value: your npm automation token (npmjs.com → Access Tokens)
#
#   2. Bump version and push a tag:
#      npm version patch   # 1.0.0 → 1.0.1
#      npm version minor   # 1.0.0 → 1.1.0
#      npm version major   # 1.0.0 → 2.0.0
#      git push && git push --tags
#
#   That's it — this workflow fires automatically.
# ============================================================

name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v1.2.3, v2.0.0-beta.1

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Release
      id-token: write   # needed for npm provenance

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog generation

      # ── 2. Setup Node.js ─────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type check ────────────────────────────────────
      - name: Type check
        run: npx tsc --noEmit

      # ── 5. Build ─────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Verify build output ───────────────────────────
      - name: Verify dist exists
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== Checking entry point ==="
          test -f dist/index.js && echo "✓ dist/index.js exists" || (echo "✗ dist/index.js missing" && exit 1)

      # ── 7. Extract version from tag ──────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      # ── 8. Verify package.json version matches tag ───────
      - name: Verify version match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "package.json version : $PKG_VERSION"
          echo "Git tag version      : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "✗ Version mismatch! Update package.json before tagging."
            echo "  Run: npm version $TAG_VERSION"
            exit 1
          fi
          echo "✓ Versions match"

      # ── 9. Publish to npm ─────────────────────────────────
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 10. Generate release notes ────────────────────────
      - name: Generate release notes
        id: release_notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            NOTES="Initial release of OllamaCode 🦙"
          else
            NOTES=$(git log "$PREV_TAG".."${{ steps.version.outputs.tag }}" \
              --pretty=format:"- %s (%h)" \
              --no-merges | head -50)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 11. Create GitHub Release ─────────────────────────
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: OllamaCode ${{ steps.version.outputs.tag }}
          body: |
            ## OllamaCode ${{ steps.version.outputs.tag }}

            ### Install
            ```bash
            npm install -g ollamacode@${{ steps.version.outputs.version }}
            ```

            ### Changes
            ${{ steps.release_notes.outputs.notes }}

            ---
            📦 [View on npm](https://www.npmjs.com/package/ollamacode/v/${{ steps.version.outputs.version }})
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}